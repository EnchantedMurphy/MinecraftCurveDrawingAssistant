<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minecraft绘制辅助工具</title>
<link rel="icon" href="figs/logo.svg" type="image/svg+xml">
<style>
  :root{
    --accent:#5b9bd5;--accent-dim:#4a8bc5;
    --bg:#1a1d23;--bg2:#21252b;--bg3:#181a1f;
    --border:#2d333b;--border2:#383e47;
    --text:#edf0f5;--text-heading:#fff;--text-muted:#b0b5bd;--text-dim:#868c95;
    --tab-active:#2a303a;--tab-bg:#15181d;
  }
  .light{
    --accent:#2563eb;--accent-dim:#1d4ed8;
    --bg:#f5f6f8;--bg2:#ffffff;--bg3:#eef0f4;
    --border:#d8dce3;--border2:#e5e8ed;
    --text:#111827;--text-heading:#000;--text-muted:#4b5563;--text-dim:#6b7280;
    --tab-active:rgba(37,99,235,0.12);--tab-bg:#e8ecf2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background .3s,color .3s}

  /* ── Left column ── */
  .left-col{display:flex;flex-direction:column;flex-shrink:0}
  .top-bar{height:44px;display:flex;align-items:center;padding:0 6px;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;transition:width .32s cubic-bezier(.4,0,.2,1);width:328px}
  .top-bar.collapsed{width:48px}
  .top-title{font-size:1.05rem;font-weight:700;color:var(--text-heading);white-space:nowrap;overflow:hidden;margin-left:8px}
  .left-row{display:flex;flex:1;overflow:hidden}
  /* ── Tab bar ── */
  .tab-bar{width:48px;flex-shrink:0;background:var(--tab-bg);display:flex;flex-direction:column;align-items:center;padding:6px 0;border-right:1px solid var(--border);z-index:10;gap:0}
  .tab-bar-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:8px}
  .tab-bar-bot{display:flex;flex-direction:column;align-items:center;gap:4px;padding-bottom:2px}
  .tab-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;flex-shrink:0}
  .tab-btn:hover{background:var(--tab-active);color:var(--accent)}
  .tab-btn.active{background:var(--tab-active);color:var(--accent)}
  .tab-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab-sep{width:24px;height:1px;background:var(--border);margin:4px 0}
  /* ── Sidebar ── */
  .sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-right:2px solid var(--border);overflow:hidden;transition:width .32s cubic-bezier(.4,0,.2,1)}
  .sidebar.collapsed{width:0;border-right:none}
  .sidebar-inner{width:280px;min-width:280px;height:100%;display:flex;flex-direction:column}

  /* ── Panel content ── */
  .panel-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;display:flex;flex-direction:column;gap:11px}
  .panel-content h2{color:var(--accent);font-size:0.88rem;border-top:1px solid var(--border);padding-top:10px;margin-top:8px}
  .panel-content h2:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .field-group{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .field{display:flex;flex-direction:column;gap:3px}
  label{font-size:0.75rem;color:var(--text-muted)}
  input[type=number]{background:var(--bg3);border:1px solid var(--border);color:var(--accent);padding:5px 7px;border-radius:4px;font-size:0.85rem;width:100%;outline:none;transition:border-color .2s}
  input[type=number]:focus{border-color:var(--accent)}
  select{background:var(--bg3);border:1px solid var(--border);color:var(--accent);padding:5px 7px;border-radius:4px;font-size:0.85rem;width:100%;outline:none}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .gen-btn{background:var(--accent);color:#fff;border:none;padding:8px;border-radius:4px;font-weight:bold;font-size:0.9rem;cursor:pointer;transition:background .2s;width:100%}
  .gen-btn:hover{background:var(--accent-dim)}
  textarea{background:var(--bg3);border:1px solid var(--border);color:var(--accent);padding:8px;border-radius:4px;font-size:0.75rem;font-family:monospace;resize:vertical;min-height:120px;width:100%;outline:none}
  .count-info{font-size:0.76rem;color:var(--text-dim);text-align:right;margin-top:2px}
  .section-label{font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .angle-row{display:flex;flex-direction:column;gap:3px}
  .angle-inputs{display:flex;align-items:center;gap:6px}
  .angle-inputs input[type=range]{flex:1;accent-color:var(--accent)}
  .angle-inputs input[type=number]{width:58px;flex-shrink:0}
  .angle-inputs span{font-size:0.8rem;color:var(--text-muted);flex-shrink:0}
  .panel-content.hidden{display:none}
  .check-row{display:flex;align-items:center;gap:8px;padding:3px 0}
  .check-row input{accent-color:var(--accent)}
  .check-row label{cursor:pointer}
  .hint{font-size:.7rem;line-height:1.45;color:var(--text-dim)}
  #arcFields{display:flex;flex-direction:column;gap:11px}
  #arcFields h2{margin-bottom:0}
  #arcFields h2:first-of-type{border-top:1px solid var(--border);padding-top:10px;margin-top:8px}
  input:disabled,select:disabled{opacity:.45;cursor:not-allowed}
  .error-info{min-height:1em;font-size:.72rem;color:#ef7373}
  .error-info:empty{display:none}

  /* ── Canvas area ── */
  .canvas-area{flex:1;position:relative;display:flex;background:var(--bg);overflow:hidden;min-width:0}
  canvas{flex:1;min-width:0;min-height:0;background:var(--bg3);cursor:crosshair;touch-action:none;user-select:none;-webkit-user-select:none}
  .canvas-overlay-tr{position:absolute;top:10px;right:12px;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;z-index:5}
  .canvas-overlay-tr label{font-size:0.78rem;color:var(--text-muted)}
  .canvas-overlay-tr input[type=range]{width:90px;accent-color:var(--accent)}
  .canvas-overlay-tr span{font-size:0.78rem;color:var(--accent);min-width:44px}
  .reset-btn{background:transparent;color:var(--text-muted);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-size:0.78rem;cursor:pointer;transition:color .2s,border-color .2s}
  .reset-btn:hover{color:var(--accent);border-color:var(--accent)}
  .canvas-overlay-tl{position:absolute;top:10px;left:12px;display:flex;align-items:baseline;gap:6px;z-index:5}
  .canvas-overlay-tl .tl-title{font-size:1.05rem;font-weight:700;color:var(--text-heading)}
  .tl-ver{font-size:0.72rem;border-radius:4px;padding:1px 7px;white-space:nowrap}
  :root .tl-ver{color:#7ab8e8;background:rgba(91,155,213,0.15)}
  .light .tl-ver{color:#2563eb;background:rgba(37,99,235,0.1)}
  .canvas-overlay-br{position:absolute;bottom:10px;right:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;z-index:5}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:0.73rem;color:var(--text-muted)}
  .legend-item.hidden{display:none}
  .legend-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden">

          <option value="8">有对角连接（适合墙壁）</option>

  <!-- Canvas area: fills remaining space -->

    </div>
    <canvas id="cv"></canvas>
    <div class="canvas-overlay-br">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);opacity:.6"></div>方块路径</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f80;width:3px;height:11px;border-radius:1px"></div><span id="smoothLegend">原始曲线</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#f0f;width:9px;height:9px;border-radius:50%"></div>端点</div>
      <div class="legend-item" id="controlLegend"><div class="legend-dot" style="background:rgba(255,255,0,.5);width:9px;height:9px;border-radius:50%"></div>控制点</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let cellSize = 16;
let offsetX = 0, offsetY = 0;
let isDragging = false, dragStart = {x:0,y:0}, dragOffset = {x:0,y:0};
let lastBlocks = [];
let arcLastBlocks = [];
let currentTab = 0;

function resizeCanvas(){
  const area = document.getElementById('canvasArea');
  cv.width = area.clientWidth;
  cv.height = area.clientHeight;
}

function toScreen(wx, wz){
  return {x: offsetX + wx * cellSize, y: offsetY + wz * cellSize};
}
function toWorld(sx, sy){
  return {x:(sx-offsetX)/cellSize, z:(sy-offsetY)/cellSize};
}

function resetView(){
  if(currentTab===1){
    const arc=getArcGeometry(false);
    if(arc){
      offsetX=cv.width/2-arc.cx*cellSize;
      offsetY=cv.height/2-arc.cz*cellSize;
      render();
    }
    return;
  }
  const x0=+document.getElementById('x0').value, z0=+document.getElementById('z0').value;
  const x1=+document.getElementById('x1').value, z1=+document.getElementById('z1').value;
  const cx=(x0+x1)/2, cz=(z0+z1)/2;
  offsetX = cv.width/2 - cx*cellSize;
  offsetY = cv.height/2 - cz*cellSize;
  render();
}

function getBezierPoints(){
  const x0=+document.getElementById('x0').value, z0=+document.getElementById('z0').value;
  const x1=+document.getElementById('x1').value, z1=+document.getElementById('z1').value;
  const a0=+document.getElementById('a0').value * Math.PI/180;
  const a1=+document.getElementById('a1').value * Math.PI/180;
  const h0=+document.getElementById('h0').value;
  const h1=+document.getElementById('h1').value;
  const cx0 = x0 + Math.cos(a0)*h0, cz0 = z0 + Math.sin(a0)*h0;
  const cx1 = x1 - Math.cos(a1)*h1, cz1 = z1 - Math.sin(a1)*h1;
  return {p0:{x:x0,z:z0}, p1:{x:cx0,z:cz0}, p2:{x:cx1,z:cz1}, p3:{x:x1,z:z1}};
}

function bezier(t, p0, p1, p2, p3){
  const mt=1-t;
  return p0*mt*mt*mt + 3*p1*mt*mt*t + 3*p2*mt*t*t + p3*t*t*t;
}

function sampleCurve(n=500){
  const {p0,p1,p2,p3} = getBezierPoints();
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    pts.push({x:bezier(t,p0.x,p1.x,p2.x,p3.x), z:bezier(t,p0.z,p1.z,p2.z,p3.z)});
  }
  return pts;
}

function getBlockPath8(){
  const N = 2000;
  const {p0,p1,p2,p3} = getBezierPoints();
  function bz(t,a,b,c,d){const mt=1-t;return a*mt*mt*mt+3*b*mt*mt*t+3*c*mt*t*t+d*t*t*t;}
  const blocks=[], seen=new Set();
  function add(x,z){const k=`${x},${z}`;if(!seen.has(k)){seen.add(k);blocks.push({x,z});}}
  let cx=Math.round(bz(0,p0.x,p1.x,p2.x,p3.x));
  let cz=Math.round(bz(0,p0.z,p1.z,p2.z,p3.z));
  add(cx,cz);
  for(let i=1;i<=N;i++){
    const t=i/N;
    const fx=bz(t,p0.x,p1.x,p2.x,p3.x);
    const fz=bz(t,p0.z,p1.z,p2.z,p3.z);
    let guard=0;
    while(Math.max(Math.abs(fx-cx),Math.abs(fz-cz))>=1 && guard++<200){
      // pick the 8-neighbor closest (euclidean) to the target curve point
      let bdx=0,bdz=0,bd=Infinity;
      for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++){
        if(!dx&&!dz) continue;
        const d=(cx+dx-fx)**2+(cz+dz-fz)**2;
        if(d<bd){bd=d;bdx=dx;bdz=dz;}
      }
      cx+=bdx; cz+=bdz;
      add(cx,cz);
    }
  }
  return blocks;
}

function getBlockPath4(){
  const blocks8 = getBlockPath8();
  if(blocks8.length===0) return [];
  const result=[blocks8[0]];
  const seen=new Set([`${blocks8[0].x},${blocks8[0].z}`]);
  function add(x,z){
    const k=`${x},${z}`;
    if(!seen.has(k)){seen.add(k);result.push({x,z});}
  }
  for(let i=1;i<blocks8.length;i++){
    const prev=result[result.length-1];
    const cur=blocks8[i];
    const dx=cur.x-prev.x, dz=cur.z-prev.z;
    if(!(Math.abs(dx)===1&&Math.abs(dz)===1)){
      add(cur.x,cur.z);
    } else {
      // diagonal step: insert intermediate, axis chosen by next step momentum
      let stepXFirst;
      if(i+1<blocks8.length){
        const nxt=blocks8[i+1];
        stepXFirst=Math.abs(nxt.x-cur.x)>=Math.abs(nxt.z-cur.z);
      } else {
        stepXFirst=Math.abs(dx)>=Math.abs(dz);
      }
      if(stepXFirst){ add(prev.x+dx,prev.z); } else { add(prev.x,prev.z+dz); }
      add(cur.x,cur.z);
    }
  }
  return result;
}

function drawGrid(){
  const left=toWorld(0,0), right=toWorld(cv.width,cv.height);
  const x0=Math.floor(left.x)-1, x1=Math.ceil(right.x)+1;
  const z0=Math.floor(left.z)-1, z1=Math.ceil(right.z)+1;
  const gridCol=isDark?'#252a33':'#d8dce3';
  const axisCol=isDark?'#323943':'#a8b5c8';
  ctx.strokeStyle=gridCol;
  ctx.lineWidth=1;
  for(let x=x0;x<=x1;x++){
    const s=toScreen(x,0);
    ctx.beginPath();ctx.moveTo(s.x,0);ctx.lineTo(s.x,cv.height);ctx.stroke();
  }
  for(let z=z0;z<=z1;z++){
    const s=toScreen(0,z);
    ctx.beginPath();ctx.moveTo(0,s.y);ctx.lineTo(cv.width,s.y);ctx.stroke();
  }
  ctx.strokeStyle=axisCol;ctx.lineWidth=1.5;
  const ox=toScreen(0,0);
  ctx.beginPath();ctx.moveTo(ox.x,0);ctx.lineTo(ox.x,cv.height);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ox.y);ctx.lineTo(cv.width,ox.y);ctx.stroke();
}

function renderBezier(){
  ctx.clearRect(0,0,cv.width,cv.height);
  drawGrid();

  const {p0,p1,p2,p3}=getBezierPoints();

  // draw blocks
  if(lastBlocks.length>0){
    const ac=isDark?'91,155,213':'37,99,235';
    ctx.fillStyle=`rgba(${ac},0.25)`;
    ctx.strokeStyle=`rgba(${ac},0.5)`;
    ctx.lineWidth=0.5;
    for(const b of lastBlocks){
      const s=toScreen(b.x-0.5,b.z-0.5);
      ctx.fillRect(s.x,s.y,cellSize,cellSize);
      ctx.strokeRect(s.x,s.y,cellSize,cellSize);
    }
    if(cellSize>=10){
      ctx.fillStyle=isDark?'#5b9bd5':'#2563eb';
      ctx.font=`${Math.max(8,cellSize*0.45)}px monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      const b0=lastBlocks[0], s0=toScreen(b0.x,b0.z);
      ctx.fillText('S',s0.x,s0.y);
      const bn=lastBlocks[lastBlocks.length-1], sn=toScreen(bn.x,bn.z);
      ctx.fillText('E',sn.x,sn.y);
    }
  }

  // draw smooth curve
  const curve=sampleCurve(300);
  ctx.beginPath();
  for(let i=0;i<curve.length;i++){
    const s=toScreen(curve[i].x,curve[i].z);
    i===0?ctx.moveTo(s.x,s.y):ctx.lineTo(s.x,s.y);
  }
  ctx.strokeStyle=isDark?'#ff8800':'#d4700a';ctx.lineWidth=2;ctx.stroke();

  // control handles
  ctx.setLineDash([4,4]);
  ctx.strokeStyle=isDark?'rgba(255,255,0,0.27)':'rgba(180,140,20,0.5)';ctx.lineWidth=1;
  const sp0=toScreen(p0.x,p0.z), sp1=toScreen(p1.x,p1.z);
  const sp2=toScreen(p2.x,p2.z), sp3=toScreen(p3.x,p3.z);
  ctx.beginPath();ctx.moveTo(sp0.x,sp0.y);ctx.lineTo(sp1.x,sp1.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sp3.x,sp3.y);ctx.lineTo(sp2.x,sp2.y);ctx.stroke();
  ctx.setLineDash([]);

  // control points
  ctx.fillStyle=isDark?'rgba(255,255,0,0.53)':'rgba(180,130,0,0.6)';
  [[sp1,'cp1'],[sp2,'cp2']].forEach(([p,])=>{
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
  });

  // endpoints
  [[sp0,'S'],[sp3,'E']].forEach(([p,lbl])=>{
    ctx.fillStyle=isDark?'#ff00ff':'#c030c0';
    ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=isDark?'#fff':'#fff';
    ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lbl,p.x,p.y);
  });
}

function normAngle(a){
  const tau=Math.PI*2;
  return ((a%tau)+tau)%tau;
}
function arcDelta(from,to,dir){
  return dir>0?normAngle(to-from):-normAngle(from-to);
}
function num(id){ return +document.getElementById(id).value; }
function pointFrom(prefix){ return {x:num(prefix+'x'),z:num(prefix+'z')}; }

function getArcGeometry(showError=true){
  const method=document.getElementById('arcMethod').value;
  const full=document.getElementById('arcFull').checked;
  let cx,cz,r,start,sweep,midPoint=null;
  try{
    if(method==='center'){
      cx=num('acx'); cz=num('acz'); r=num('ar');
      start=num('asa')*Math.PI/180;
      const dir=document.getElementById('adir').value==='cw'?1:-1;
      sweep=full?dir*Math.PI*2:arcDelta(start,num('aea')*Math.PI/180,dir);
    }else if(method==='endpoints'){
      const p0=pointFrom('ae0'),p1=pointFrom('ae1');
      r=num('aer');
      const dx=p1.x-p0.x,dz=p1.z-p0.z,chord=Math.hypot(dx,dz);
      if(chord<1e-9) throw Error('起点与终点不能重合。');
      if(r<chord/2) throw Error(`半径至少应为 ${(chord/2).toFixed(3)}。`);
      const dir=document.getElementById('aedir').value==='cw'?1:-1;
      const wantLarge=document.getElementById('aelarge').value==='large';
      const mx=(p0.x+p1.x)/2,mz=(p0.z+p1.z)/2,h=Math.sqrt(Math.max(0,r*r-chord*chord/4));
      const candidates=[
        {cx:mx-dz/chord*h,cz:mz+dx/chord*h},
        {cx:mx+dz/chord*h,cz:mz-dx/chord*h}
      ];
      let chosen=candidates[0], chosenSweep=0;
      for(const c of candidates){
        const s=Math.atan2(p0.z-c.cz,p0.x-c.cx);
        const sw=arcDelta(s,Math.atan2(p1.z-c.cz,p1.x-c.cx),dir);
        if((wantLarge&&Math.abs(sw)>Math.PI+1e-9)||(!wantLarge&&Math.abs(sw)<=Math.PI+1e-9)){chosen=c;chosenSweep=sw;break;}
      }
      cx=chosen.cx;cz=chosen.cz;start=Math.atan2(p0.z-cz,p0.x-cx);
      sweep=full?dir*Math.PI*2:chosenSweep;
    }else if(method==='three'){
      const a=pointFrom('at0'),b=pointFrom('at1'),m=pointFrom('atm');
      const d=2*(a.x*(b.z-m.z)+b.x*(m.z-a.z)+m.x*(a.z-b.z));
      if(Math.abs(d)<1e-9) throw Error('三个点不能共线。');
      const aa=a.x*a.x+a.z*a.z,bb=b.x*b.x+b.z*b.z,mm=m.x*m.x+m.z*m.z;
      cx=(aa*(b.z-m.z)+bb*(m.z-a.z)+mm*(a.z-b.z))/d;
      cz=(aa*(m.x-b.x)+bb*(a.x-m.x)+mm*(b.x-a.x))/d;
      r=Math.hypot(a.x-cx,a.z-cz); start=Math.atan2(a.z-cz,a.x-cx);
      const end=Math.atan2(b.z-cz,b.x-cx),middle=Math.atan2(m.z-cz,m.x-cx);
      const cw=arcDelta(start,end,1);
      const dir=Math.abs(arcDelta(start,middle,1))<=Math.abs(cw)+1e-9?1:-1;
      sweep=full?dir*Math.PI*2:arcDelta(start,end,dir);
      midPoint=m;
    }else{
      const p=pointFrom('ap0'), tangent=num('apata')*Math.PI/180;
      r=num('apr');
      const dir=document.getElementById('apdir').value==='cw'?1:-1;
      cx=p.x-dir*Math.sin(tangent)*r;
      cz=p.z+dir*Math.cos(tangent)*r;
      start=Math.atan2(p.z-cz,p.x-cx);
      sweep=dir*(full?360:num('apsweep'))*Math.PI/180;
    }
    if(!Number.isFinite(cx+cz+r+start+sweep)||r<=0) throw Error('请输入有效的坐标和正半径。');
    if(Math.abs(sweep)<1e-9) throw Error('弧形角度不能为 0°。');
    document.getElementById('arcError').textContent='';
    return {cx,cz,r,start,sweep,midPoint};
  }catch(e){
    if(showError) document.getElementById('arcError').textContent=e.message;
    return null;
  }
}

function sampleArc(n=1200){
  const a=getArcGeometry();
  if(!a) return [];
  const count=Math.max(32,Math.ceil(Math.abs(a.sweep)*a.r*12),n);
  return Array.from({length:count+1},(_,i)=>{
    const t=a.start+a.sweep*i/count;
    return {x:a.cx+Math.cos(t)*a.r,z:a.cz+Math.sin(t)*a.r};
  });
}

function getArcBlockPath8(points){
  if(!points.length) return [];
  const path=[],seen=new Set();
  const add=(x,z)=>{const k=`${x},${z}`;if(!seen.has(k)){seen.add(k);path.push({x,z});}};
  let x=Math.round(points[0].x),z=Math.round(points[0].z);
  add(x,z);
  for(let i=1;i<points.length;i++){
    const fx=points[i].x,fz=points[i].z;
    let guard=0;
    while(Math.max(Math.abs(fx-x),Math.abs(fz-z))>=1&&guard++<200){
      let bestDx=0,bestDz=0,bestDistance=Infinity;
      for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++){
        if(!dx&&!dz) continue;
        const distance=(x+dx-fx)**2+(z+dz-fz)**2;
        if(distance<bestDistance){
          bestDistance=distance;bestDx=dx;bestDz=dz;
        }
      }
      x+=bestDx;z+=bestDz;
      add(x,z);
    }
  }

  // The distance-based tracing above may stop in a neighboring block when
  // the geometric endpoint has fractional coordinates. Always finish at the
  // block that actually contains the endpoint.
  const endpoint=points[points.length-1];
  const endX=Math.round(endpoint.x),endZ=Math.round(endpoint.z);
  let endpointGuard=0;
  while((x!==endX||z!==endZ)&&endpointGuard++<1000){
    x+=Math.sign(endX-x);
    z+=Math.sign(endZ-z);
    add(x,z);
  }

  return path;
}

function getArcBlockPath4(points){
  const blocks8=getArcBlockPath8(points);
  if(!blocks8.length) return [];
  const result=[blocks8[0]],seen=new Set([`${blocks8[0].x},${blocks8[0].z}`]);
  const arc=getArcGeometry(false);
  const add=(x,z)=>{
    const key=`${x},${z}`;
    if(!seen.has(key)){seen.add(key);result.push({x,z});}
  };
  for(let i=1;i<blocks8.length;i++){
    // Always compare consecutive points from the original 8-neighbor path.
    // An inserted corner must not influence how the next diagonal is resolved.
    const prev=blocks8[i-1],cur=blocks8[i];
    const dx=cur.x-prev.x,dz=cur.z-prev.z;
    if(Math.abs(dx)===1&&Math.abs(dz)===1){
      const xCandidate={x:prev.x+dx,z:prev.z};
      const zCandidate={x:prev.x,z:prev.z+dz};
      let useX=true;
      if(arc){
        const radialError=p=>Math.abs(Math.hypot(p.x-arc.cx,p.z-arc.cz)-arc.r);
        const xError=radialError(xCandidate),zError=radialError(zCandidate);
        // A fixed X-first tie break is preserved by both horizontal and
        // vertical reflection, unlike the former look-ahead rule.
        useX=xError<=zError+1e-10;
      }
      add(useX?xCandidate.x:zCandidate.x,useX?xCandidate.z:zCandidate.z);
    }
    add(cur.x,cur.z);
  }
  return result;
}

function renderArc(){
  ctx.clearRect(0,0,cv.width,cv.height); drawGrid();
  if(arcLastBlocks.length){
    const ac=isDark?'91,155,213':'37,99,235';
    ctx.fillStyle=`rgba(${ac},0.25)`;ctx.strokeStyle=`rgba(${ac},0.5)`;ctx.lineWidth=.5;
    for(const b of arcLastBlocks){
      const s=toScreen(b.x-.5,b.z-.5);
      ctx.fillRect(s.x,s.y,cellSize,cellSize);ctx.strokeRect(s.x,s.y,cellSize,cellSize);
    }
  }
  const a=getArcGeometry(false),points=a?sampleArc(500):[];
  if(!a||!points.length) return;
  ctx.beginPath();
  points.forEach((p,i)=>{const s=toScreen(p.x,p.z);i?ctx.lineTo(s.x,s.y):ctx.moveTo(s.x,s.y);});
  ctx.strokeStyle=isDark?'#ff8800':'#d4700a';ctx.lineWidth=2;ctx.stroke();

  const method=document.getElementById('arcMethod').value;
  if(method==='tangent'){
    const p=points[0],angle=num('apata')*Math.PI/180;
    const halfLength=Math.max(4,Math.min(12,a.r));
    const lineStart=toScreen(
      p.x-Math.cos(angle)*halfLength,
      p.z-Math.sin(angle)*halfLength
    );
    const lineEnd=toScreen(
      p.x+Math.cos(angle)*halfLength,
      p.z+Math.sin(angle)*halfLength
    );
    ctx.save();
    ctx.setLineDash([6,4]);
    ctx.strokeStyle=isDark?'rgba(90,220,255,.8)':'rgba(0,130,180,.8)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(lineStart.x,lineStart.y);ctx.lineTo(lineEnd.x,lineEnd.y);ctx.stroke();
    ctx.restore();
  }

  const c=toScreen(a.cx,a.cz);
  ctx.fillStyle=isDark?'rgba(255,255,0,.65)':'rgba(180,130,0,.7)';
  ctx.beginPath();ctx.arc(c.x,c.y,4,0,Math.PI*2);ctx.fill();

  if(method==='three'&&a.midPoint){
    const m=toScreen(a.midPoint.x,a.midPoint.z);
    ctx.fillStyle=isDark?'#00c8ff':'#0087b8';
    ctx.beginPath();ctx.arc(m.x,m.y,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('M',m.x,m.y);
  }

  const endpoints=[points[0],points[points.length-1]];
  endpoints.forEach((p,i)=>{
    const s=toScreen(p.x,p.z);ctx.fillStyle=isDark?'#ff00ff':'#c030c0';
    ctx.beginPath();ctx.arc(s.x,s.y,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(i?'E':'S',s.x,s.y);
  });
}

function render(){ currentTab===0?renderBezier():renderArc(); }

function draw(){
  const mode=document.getElementById('mode').value;
  lastBlocks = mode==='8' ? getBlockPath8() : getBlockPath4();
  const lines=lastBlocks.map(b=>`${b.x} ${b.z}`).join('\n');
  document.getElementById('output').value=lines;
  document.getElementById('countInfo').textContent=`共 ${lastBlocks.length} 个方块`;
  resetView();
}

function updateArcFields(){
  document.getElementById('arcFields').innerHTML=arcForms[document.getElementById('arcMethod').value];
  document.querySelectorAll('#arcFields input,#arcFields select').forEach(el=>{
    el.addEventListener('input',()=>{updateFullCircleState();render();});
    el.addEventListener('change',()=>{updateFullCircleState();render();});
  });
  [['asas','asa'],['aeas','aea'],['apatas','apata'],['apsweeps','apsweep']].forEach(([sliderId,numId])=>{
    const slider=document.getElementById(sliderId),number=document.getElementById(numId);
    if(!slider||!number) return;
    slider.addEventListener('input',()=>{number.value=slider.value;render();});
    number.addEventListener('input',()=>{
      const min=+slider.min,max=+slider.max;
      slider.value=Math.min(max,Math.max(min,+number.value||0));
    });
  });
  updateArcAuxLegend();
  updateFullCircleState(); render();
}
function updateArcAuxLegend(){
  if(currentTab!==1) return;
  const method=document.getElementById('arcMethod').value;
  const legend=document.getElementById('arcAuxLegend');
  legend.classList.toggle('hidden',method!=='three'&&method!=='tangent');
  if(method==='three'){
    legend.innerHTML='<div class="legend-dot" style="background:#00c8ff;width:9px;height:9px;border-radius:50%"></div>弧上中间点';
  }else if(method==='tangent'){
    legend.innerHTML='<div style="width:14px;border-top:2px dashed #5adcff;flex-shrink:0"></div>起点切线';
  }else{
    legend.innerHTML='';
  }
}
function updateFullCircleState(){
  const full=document.getElementById('arcFull').checked;
  document.querySelectorAll('#arcFields [data-arc-length]').forEach(el=>el.disabled=full);
}
function drawArc(){
  const pts=sampleArc();
  if(!pts.length) return;
  arcLastBlocks=document.getElementById('arcMode').value==='8'
    ?getArcBlockPath8(pts)
    :getArcBlockPath4(pts);
  document.getElementById('arcOutput').value=arcLastBlocks.map(b=>`${b.x} ${b.z}`).join('\n');

  resetView();
}

// Mouse/touch drag and two-finger pinch zoom
const activePointers = new Map();
let pinchStart = null;

function updateZoomDisplay(){
  document.getElementById('zoom').value=cellSize;
  document.getElementById('zoomVal').textContent=Math.round(cellSize*10)/10+'px/格';
}

function startDrag(pointer){
  isDragging=true;
  dragStart={x:pointer.x,y:pointer.y};
  dragOffset={x:offsetX,y:offsetY};
}

function startPinch(){
  const [a,b]=[...activePointers.values()];
  const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
  pinchStart={
    distance:Math.hypot(b.x-a.x,b.y-a.y),
    cellSize,
    world:toWorld(cx,cy)
  };
  isDragging=false;
}

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  activePointers.set(e.pointerId,{x:e.clientX-rect.left,y:e.clientY-rect.top});
  cv.setPointerCapture(e.pointerId);
  if(activePointers.size===1) startDrag(activePointers.values().next().value);
  else if(activePointers.size===2) startPinch();
});

cv.addEventListener('pointermove',e=>{
  if(!activePointers.has(e.pointerId)) return;
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  activePointers.set(e.pointerId,{x:e.clientX-rect.left,y:e.clientY-rect.top});

  if(activePointers.size>=2){
    const [a,b]=[...activePointers.values()];
    const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
    const distance=Math.hypot(b.x-a.x,b.y-a.y);
    if(!pinchStart) startPinch();
    if(pinchStart.distance>0){
      cellSize=Math.max(4,Math.min(40,pinchStart.cellSize*distance/pinchStart.distance));
      offsetX=cx-pinchStart.world.x*cellSize;
      offsetY=cy-pinchStart.world.z*cellSize;
      updateZoomDisplay();
      render();
    }
  }else if(isDragging){
    const pointer=activePointers.values().next().value;
    offsetX=dragOffset.x+(pointer.x-dragStart.x);
    offsetY=dragOffset.y+(pointer.y-dragStart.y);
    render();
  }
});

function endPointer(e){
  activePointers.delete(e.pointerId);
  pinchStart=null;
  if(activePointers.size===1) startDrag(activePointers.values().next().value);
  else if(activePointers.size===0) isDragging=false;
  else startPinch();
}
cv.addEventListener('pointerup',endPointer);
cv.addEventListener('pointercancel',endPointer);
cv.addEventListener('lostpointercapture',endPointer);

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const wBefore=toWorld(mx,my);
  cellSize=Math.max(4,Math.min(40,cellSize-(e.deltaY>0?1:-1)));
  updateZoomDisplay();
  offsetX=mx-wBefore.x*cellSize;
  offsetY=my-wBefore.z*cellSize;
  render();
},{passive:false});

// sidebar toggle — rAF-resize during transition for smooth canvas
let sideRaf=0;
const sidebar=document.getElementById('sidebar');
const topBar=document.getElementById('topBar');
sidebar.addEventListener('transitionend',()=>{cancelAnimationFrame(sideRaf);resizeCanvas();render();});
function toggleSidebar(){
  cancelAnimationFrame(sideRaf);
  (function L(){resizeCanvas();render();sideRaf=requestAnimationFrame(L);})();
  sidebar.classList.toggle('collapsed');
  topBar.classList.toggle('collapsed');
}

// tab switch
function switchTab(idx){
  currentTab=idx;
  document.querySelectorAll('.tab-icon').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('panel0').classList.toggle('hidden',idx!==0);
  document.getElementById('panel1').classList.toggle('hidden',idx!==1);
  document.getElementById('canvasTitle').textContent=idx===0?'曲线绘制':'弧形绘制';
  document.getElementById('canvasVersion').textContent=idx===0?'v0.2':'v0.1';
  document.getElementById('smoothLegend').textContent=idx===0?'原始曲线':'原始弧形';
  document.getElementById('controlLegend').innerHTML=idx===0
    ?'<div class="legend-dot" style="background:rgba(255,255,0,.5);width:9px;height:9px;border-radius:50%"></div>控制点'
    :'<div class="legend-dot" style="background:rgba(255,255,0,.5);width:9px;height:9px;border-radius:50%"></div>圆心';
  if(idx===1) updateArcAuxLegend();
  else document.getElementById('arcAuxLegend').classList.add('hidden');
  resetView();
}

// angle slider <-> number sync
function syncAngle(sliderId, numId){
  const s=document.getElementById(sliderId), n=document.getElementById(numId);
  s.addEventListener('input',()=>{n.value=s.value; render();});
  n.addEventListener('input',()=>{
    const v=Math.min(360,Math.max(0,+n.value||0));
    s.value=v; render();
  });
}
syncAngle('a0s','a0');
syncAngle('a1s','a1');

['x0','z0','x1','z1','h0','h1'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
});
document.getElementById('mode').addEventListener('change',()=>{if(lastBlocks.length)draw();});
document.getElementById('arcMethod').addEventListener('change',updateArcFields);
document.getElementById('arcFull').addEventListener('change',()=>{updateFullCircleState();render();});
document.getElementById('arcMode').addEventListener('change',()=>{if(arcLastBlocks.length)drawArc();});

window.addEventListener('resize',()=>{resizeCanvas();render();});
window.addEventListener('load',()=>{resizeCanvas();updateArcFields();draw();});

updateArcFields();
