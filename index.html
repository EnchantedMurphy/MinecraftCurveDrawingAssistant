<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Minecraft 曲线绘制辅助</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<style>
  :root{
    --accent:#5b9bd5;--accent-dim:#4a8bc5;
    --bg:#1a1d23;--bg2:#21252b;--bg3:#181a1f;
    --border:#2d333b;--border2:#383e47;
    --text:#edf0f5;--text-heading:#fff;--text-muted:#b0b5bd;--text-dim:#868c95;
    --tab-active:#2a303a;--tab-bg:#15181d;
  }
  .light{
    --accent:#2563eb;--accent-dim:#1d4ed8;
    --bg:#f5f6f8;--bg2:#ffffff;--bg3:#eef0f4;
    --border:#d8dce3;--border2:#e5e8ed;
    --text:#111827;--text-heading:#000;--text-muted:#4b5563;--text-dim:#6b7280;
    --tab-active:rgba(37,99,235,0.12);--tab-bg:#e8ecf2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background .3s,color .3s}

  /* ── Left column ── */
  .left-col{display:flex;flex-direction:column;flex-shrink:0}
  .top-bar{height:44px;display:flex;align-items:center;padding:0 6px;background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;transition:width .32s cubic-bezier(.4,0,.2,1);width:328px}
  .top-bar.collapsed{width:48px}
  .top-title{font-size:1.05rem;font-weight:700;color:var(--text-heading);white-space:nowrap;overflow:hidden;margin-left:8px}
  .left-row{display:flex;flex:1;overflow:hidden}
  /* ── Tab bar ── */
  .tab-bar{width:48px;flex-shrink:0;background:var(--tab-bg);display:flex;flex-direction:column;align-items:center;padding:6px 0;border-right:1px solid var(--border);z-index:10;gap:0}
  .tab-bar-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:8px}
  .tab-bar-bot{display:flex;flex-direction:column;align-items:center;gap:4px;padding-bottom:2px}
  .tab-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;flex-shrink:0}
  .tab-btn:hover{background:var(--tab-active);color:var(--accent)}
  .tab-btn.active{background:var(--tab-active);color:var(--accent)}
  .tab-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab-sep{width:24px;height:1px;background:var(--border);margin:4px 0}
  /* ── Sidebar ── */
  .sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-right:2px solid var(--border);overflow:hidden;transition:width .32s cubic-bezier(.4,0,.2,1)}
  .sidebar.collapsed{width:0;border-right:none}
  .sidebar-inner{width:280px;min-width:280px;height:100%;display:flex;flex-direction:column}

  /* ── Panel content ── */
  .panel-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;display:flex;flex-direction:column;gap:11px}
  .panel-content h2{color:var(--accent);font-size:0.88rem;border-top:1px solid var(--border);padding-top:10px;margin-top:8px}
  .panel-content h2:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .field-group{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .field{display:flex;flex-direction:column;gap:3px}
  label{font-size:0.75rem;color:var(--text-muted)}
  input[type=number]{background:var(--bg3);border:1px solid var(--border);color:var(--accent);padding:5px 7px;border-radius:4px;font-size:0.85rem;width:100%;outline:none;transition:border-color .2s}
  input[type=number]:focus{border-color:var(--accent)}
  select{background:var(--bg3);border:1px solid var(--border);color:var(--accent);padding:5px 7px;border-radius:4px;font-size:0.85rem;width:100%;outline:none}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .gen-btn{background:var(--accent);color:#fff;border:none;padding:8px;border-radius:4px;font-weight:bold;font-size:0.9rem;cursor:pointer;transition:background .2s;width:100%}
  .gen-btn:hover{background:var(--accent-dim)}
  textarea{background:var(--bg3);border:1px solid var(--border);color:var(--accent);padding:8px;border-radius:4px;font-size:0.75rem;font-family:monospace;resize:vertical;min-height:120px;width:100%;outline:none}
  .count-info{font-size:0.76rem;color:var(--text-dim);text-align:right;margin-top:2px}
  .section-label{font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .angle-row{display:flex;flex-direction:column;gap:3px}
  .angle-inputs{display:flex;align-items:center;gap:6px}
  .angle-inputs input[type=range]{flex:1;accent-color:var(--accent)}
  .angle-inputs input[type=number]{width:58px;flex-shrink:0}
  .angle-inputs span{font-size:0.8rem;color:var(--text-muted);flex-shrink:0}

  /* ── Canvas area ── */
  .canvas-area{flex:1;position:relative;display:flex;background:var(--bg);overflow:hidden;min-width:0}
  canvas{flex:1;min-width:0;min-height:0;background:var(--bg3);cursor:crosshair}
  .canvas-overlay-tr{position:absolute;top:10px;right:12px;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;z-index:5}
  .canvas-overlay-tr label{font-size:0.78rem;color:var(--text-muted)}
  .canvas-overlay-tr input[type=range]{width:90px;accent-color:var(--accent)}
  .canvas-overlay-tr span{font-size:0.78rem;color:var(--accent);min-width:44px}
  .reset-btn{background:transparent;color:var(--text-muted);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-size:0.78rem;cursor:pointer;transition:color .2s,border-color .2s}
  .reset-btn:hover{color:var(--accent);border-color:var(--accent)}
  .canvas-overlay-tl{position:absolute;top:10px;left:12px;display:flex;align-items:baseline;gap:6px;z-index:5}
  .canvas-overlay-tl .tl-title{font-size:1.05rem;font-weight:700;color:var(--text-heading)}
  .tl-ver{font-size:0.72rem;border-radius:4px;padding:1px 7px;white-space:nowrap}
  :root .tl-ver{color:#7ab8e8;background:rgba(91,155,213,0.15)}
  .light .tl-ver{color:#2563eb;background:rgba(37,99,235,0.1)}
  .canvas-overlay-br{position:absolute;bottom:10px;right:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;z-index:5}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:0.73rem;color:var(--text-muted)}
  .legend-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden">

  <!-- Left column: top-bar + tab-bar/sidebar row -->
  <div class="left-col">
    <div class="top-bar" id="topBar">
      <button class="tab-btn" onclick="toggleSidebar()" title="收起/展开菜单">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="top-title">Minecraft绘制辅助工具</span>
      <span class="tl-ver" style="margin-left:6px">v0.1</span>
    </div>
    <div class="left-row">
      <div class="tab-bar">
        <div class="tab-bar-mid">
          <button class="tab-btn tab-icon active" id="tab0" title="曲线绘制" onclick="switchTab(0)">
            <svg viewBox="0 0 24 24"><path d="M3 17 C6 17 8 7 12 7 S18 14 21 14"/><circle cx="3" cy="17" r="1.5" fill="currentColor" stroke="none"/><circle cx="21" cy="14" r="1.5" fill="currentColor" stroke="none"/></svg>
          </button>
        </div>
        <div class="tab-bar-bot">
          <button class="tab-btn" title="GitHub" onclick="window.open('https://github.com/EnchantedMurphy/MinecraftCurveDrawingAssistant','_blank')">
            <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          </button>
          <button class="tab-btn" id="themeBtn" title="切换明暗模式" onclick="toggleTheme()">
            <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </div>
      </div>
      <div class="sidebar" id="sidebar">
        <div class="sidebar-inner">
        <div class="panel-content" id="panel0">
      <h2>坐标输入</h2>
      <div class="section-label">起点</div>
      <div class="field-group">
        <div class="field"><label>X</label><input type="number" id="x0" value="0"></div>
        <div class="field"><label>Z</label><input type="number" id="z0" value="0"></div>
      </div>
      <div class="angle-row">
        <label>切线角度 (0°=+X, 90°=+Z)</label>
        <div class="angle-inputs">
          <input type="range" id="a0s" min="0" max="360" value="45">
          <input type="number" id="a0" value="45" min="0" max="360">
          <span>°</span>
        </div>
      </div>
      <div class="section-label">终点</div>
      <div class="field-group">
        <div class="field"><label>X</label><input type="number" id="x1" value="20"></div>
        <div class="field"><label>Z</label><input type="number" id="z1" value="15"></div>
      </div>
      <div class="angle-row">
        <label>切线角度 (0°=+X, 90°=+Z)</label>
        <div class="angle-inputs">
          <input type="range" id="a1s" min="0" max="360" value="135">
          <input type="number" id="a1" value="135" min="0" max="360">
          <span>°</span>
        </div>
      </div>
      <h2>曲线调节</h2>
      <div class="field-group">
        <div class="field"><label>起点把手长度</label><input type="number" id="h0" value="10" min="0.1" step="0.5"></div>
        <div class="field"><label>终点把手长度</label><input type="number" id="h1" value="10" min="0.1" step="0.5"></div>
      </div>
      <h2>方块路径模式</h2>
      <div class="field">
        <label>连接方式</label>
        <select id="mode">
          <option value="4">无对角连接（适合铁路）</option>
          <option value="8">有对角连接（适合墙壁）</option>
        </select>
      </div>
      <button class="gen-btn" onclick="draw()">生成曲线</button>
      <h2>方块坐标输出</h2>
      <textarea id="output" readonly placeholder="点击「生成曲线」后，方块坐标将显示在这里"></textarea>
      <div class="count-info" id="countInfo">—</div>
    </div>
    </div>
  </div>
    </div>
  </div>

  <!-- Canvas area: fills remaining space -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-overlay-tl">
      <span class="tl-title">Minecraft曲线绘制</span>
      <span class="tl-ver">v0.1</span>
    </div>
    <div class="canvas-overlay-tr">
      <label>缩放</label>
      <input type="range" id="zoom" min="4" max="40" value="16">
      <span id="zoomVal">16px/格</span>
      <button class="reset-btn" onclick="resetView()">重置视图</button>
    </div>
    <canvas id="cv"></canvas>
    <div class="canvas-overlay-br">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);opacity:.6"></div>方块路径</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f80;width:3px;height:11px;border-radius:1px"></div>原始曲线</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f0f;width:9px;height:9px;border-radius:50%"></div>端点</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,0,.5);width:9px;height:9px;border-radius:50%"></div>控制点</div>
    </div>
  </div>

</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let cellSize = 16;
let offsetX = 0, offsetY = 0;
let isDragging = false, dragStart = {x:0,y:0}, dragOffset = {x:0,y:0};
let lastBlocks = [];

function resizeCanvas(){
  const area = document.getElementById('canvasArea');
  cv.width = area.clientWidth;
  cv.height = area.clientHeight;
}

function toScreen(wx, wz){
  return {x: offsetX + wx * cellSize, y: offsetY + wz * cellSize};
}
function toWorld(sx, sy){
  return {x:(sx-offsetX)/cellSize, z:(sy-offsetY)/cellSize};
}

function resetView(){
  const x0=+document.getElementById('x0').value, z0=+document.getElementById('z0').value;
  const x1=+document.getElementById('x1').value, z1=+document.getElementById('z1').value;
  const cx=(x0+x1)/2, cz=(z0+z1)/2;
  offsetX = cv.width/2 - cx*cellSize;
  offsetY = cv.height/2 - cz*cellSize;
  render();
}

function getBezierPoints(){
  const x0=+document.getElementById('x0').value, z0=+document.getElementById('z0').value;
  const x1=+document.getElementById('x1').value, z1=+document.getElementById('z1').value;
  const a0=+document.getElementById('a0').value * Math.PI/180;
  const a1=+document.getElementById('a1').value * Math.PI/180;
  const h0=+document.getElementById('h0').value;
  const h1=+document.getElementById('h1').value;
  const cx0 = x0 + Math.cos(a0)*h0, cz0 = z0 + Math.sin(a0)*h0;
  const cx1 = x1 - Math.cos(a1)*h1, cz1 = z1 - Math.sin(a1)*h1;
  return {p0:{x:x0,z:z0}, p1:{x:cx0,z:cz0}, p2:{x:cx1,z:cz1}, p3:{x:x1,z:z1}};
}

function bezier(t, p0, p1, p2, p3){
  const mt=1-t;
  return p0*mt*mt*mt + 3*p1*mt*mt*t + 3*p2*mt*t*t + p3*t*t*t;
}

function sampleCurve(n=500){
  const {p0,p1,p2,p3} = getBezierPoints();
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    pts.push({x:bezier(t,p0.x,p1.x,p2.x,p3.x), z:bezier(t,p0.z,p1.z,p2.z,p3.z)});
  }
  return pts;
}

function getBlockPath8(){
  const N = 2000;
  const {p0,p1,p2,p3} = getBezierPoints();
  function bz(t,a,b,c,d){const mt=1-t;return a*mt*mt*mt+3*b*mt*mt*t+3*c*mt*t*t+d*t*t*t;}
  const blocks=[], seen=new Set();
  function add(x,z){const k=`${x},${z}`;if(!seen.has(k)){seen.add(k);blocks.push({x,z});}}
  let cx=Math.round(bz(0,p0.x,p1.x,p2.x,p3.x));
  let cz=Math.round(bz(0,p0.z,p1.z,p2.z,p3.z));
  add(cx,cz);
  for(let i=1;i<=N;i++){
    const t=i/N;
    const fx=bz(t,p0.x,p1.x,p2.x,p3.x);
    const fz=bz(t,p0.z,p1.z,p2.z,p3.z);
    let guard=0;
    while(Math.max(Math.abs(fx-cx),Math.abs(fz-cz))>=1 && guard++<200){
      // pick the 8-neighbor closest (euclidean) to the target curve point
      let bdx=0,bdz=0,bd=Infinity;
      for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++){
        if(!dx&&!dz) continue;
        const d=(cx+dx-fx)**2+(cz+dz-fz)**2;
        if(d<bd){bd=d;bdx=dx;bdz=dz;}
      }
      cx+=bdx; cz+=bdz;
      add(cx,cz);
    }
  }
  return blocks;
}

function getBlockPath4(){
  const blocks8 = getBlockPath8();
  if(blocks8.length===0) return [];
  const result=[blocks8[0]];
  const seen=new Set([`${blocks8[0].x},${blocks8[0].z}`]);
  function add(x,z){
    const k=`${x},${z}`;
    if(!seen.has(k)){seen.add(k);result.push({x,z});}
  }
  for(let i=1;i<blocks8.length;i++){
    const prev=result[result.length-1];
    const cur=blocks8[i];
    const dx=cur.x-prev.x, dz=cur.z-prev.z;
    if(!(Math.abs(dx)===1&&Math.abs(dz)===1)){
      add(cur.x,cur.z);
    } else {
      // diagonal step: insert intermediate, axis chosen by next step momentum
      let stepXFirst;
      if(i+1<blocks8.length){
        const nxt=blocks8[i+1];
        stepXFirst=Math.abs(nxt.x-cur.x)>=Math.abs(nxt.z-cur.z);
      } else {
        stepXFirst=Math.abs(dx)>=Math.abs(dz);
      }
      if(stepXFirst){ add(prev.x+dx,prev.z); } else { add(prev.x,prev.z+dz); }
      add(cur.x,cur.z);
    }
  }
  return result;
}

function drawGrid(){
  const left=toWorld(0,0), right=toWorld(cv.width,cv.height);
  const x0=Math.floor(left.x)-1, x1=Math.ceil(right.x)+1;
  const z0=Math.floor(left.z)-1, z1=Math.ceil(right.z)+1;
  const gridCol=isDark?'#252a33':'#d8dce3';
  const axisCol=isDark?'#323943':'#a8b5c8';
  ctx.strokeStyle=gridCol;
  ctx.lineWidth=1;
  for(let x=x0;x<=x1;x++){
    const s=toScreen(x,0);
    ctx.beginPath();ctx.moveTo(s.x,0);ctx.lineTo(s.x,cv.height);ctx.stroke();
  }
  for(let z=z0;z<=z1;z++){
    const s=toScreen(0,z);
    ctx.beginPath();ctx.moveTo(0,s.y);ctx.lineTo(cv.width,s.y);ctx.stroke();
  }
  ctx.strokeStyle=axisCol;ctx.lineWidth=1.5;
  const ox=toScreen(0,0);
  ctx.beginPath();ctx.moveTo(ox.x,0);ctx.lineTo(ox.x,cv.height);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ox.y);ctx.lineTo(cv.width,ox.y);ctx.stroke();
}

function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  drawGrid();

  const {p0,p1,p2,p3}=getBezierPoints();

  // draw blocks
  if(lastBlocks.length>0){
    const ac=isDark?'91,155,213':'37,99,235';
    ctx.fillStyle=`rgba(${ac},0.25)`;
    ctx.strokeStyle=`rgba(${ac},0.5)`;
    ctx.lineWidth=0.5;
    for(const b of lastBlocks){
      const s=toScreen(b.x-0.5,b.z-0.5);
      ctx.fillRect(s.x,s.y,cellSize,cellSize);
      ctx.strokeRect(s.x,s.y,cellSize,cellSize);
    }
    if(cellSize>=10){
      ctx.fillStyle=isDark?'#5b9bd5':'#2563eb';
      ctx.font=`${Math.max(8,cellSize*0.45)}px monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      const b0=lastBlocks[0], s0=toScreen(b0.x,b0.z);
      ctx.fillText('S',s0.x,s0.y);
      const bn=lastBlocks[lastBlocks.length-1], sn=toScreen(bn.x,bn.z);
      ctx.fillText('E',sn.x,sn.y);
    }
  }

  // draw smooth curve
  const curve=sampleCurve(300);
  ctx.beginPath();
  for(let i=0;i<curve.length;i++){
    const s=toScreen(curve[i].x,curve[i].z);
    i===0?ctx.moveTo(s.x,s.y):ctx.lineTo(s.x,s.y);
  }
  ctx.strokeStyle=isDark?'#ff8800':'#d4700a';ctx.lineWidth=2;ctx.stroke();

  // control handles
  ctx.setLineDash([4,4]);
  ctx.strokeStyle=isDark?'rgba(255,255,0,0.27)':'rgba(180,140,20,0.5)';ctx.lineWidth=1;
  const sp0=toScreen(p0.x,p0.z), sp1=toScreen(p1.x,p1.z);
  const sp2=toScreen(p2.x,p2.z), sp3=toScreen(p3.x,p3.z);
  ctx.beginPath();ctx.moveTo(sp0.x,sp0.y);ctx.lineTo(sp1.x,sp1.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sp3.x,sp3.y);ctx.lineTo(sp2.x,sp2.y);ctx.stroke();
  ctx.setLineDash([]);

  // control points
  ctx.fillStyle=isDark?'rgba(255,255,0,0.53)':'rgba(180,130,0,0.6)';
  [[sp1,'cp1'],[sp2,'cp2']].forEach(([p,])=>{
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
  });

  // endpoints
  [[sp0,'S'],[sp3,'E']].forEach(([p,lbl])=>{
    ctx.fillStyle=isDark?'#ff00ff':'#c030c0';
    ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=isDark?'#fff':'#fff';
    ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lbl,p.x,p.y);
  });
}

function draw(){
  const mode=document.getElementById('mode').value;
  lastBlocks = mode==='8' ? getBlockPath8() : getBlockPath4();
  const lines=lastBlocks.map(b=>`${b.x} ${b.z}`).join('\n');
  document.getElementById('output').value=lines;
  document.getElementById('countInfo').textContent=`共 ${lastBlocks.length} 个方块`;
  resetView();
}

// Zoom
document.getElementById('zoom').addEventListener('input',function(){
  cellSize=+this.value;
  document.getElementById('zoomVal').textContent=cellSize+'px/格';
  render();
});

// Drag
cv.addEventListener('mousedown',e=>{isDragging=true;dragStart={x:e.clientX,y:e.clientY};dragOffset={x:offsetX,y:offsetY};});
cv.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  offsetX=dragOffset.x+(e.clientX-dragStart.x);
  offsetY=dragOffset.y+(e.clientY-dragStart.y);
  render();
});
cv.addEventListener('mouseup',()=>isDragging=false);
cv.addEventListener('mouseleave',()=>isDragging=false);
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const wBefore=toWorld(mx,my);
  cellSize=Math.max(4,Math.min(40,cellSize-(e.deltaY>0?1:-1)));
  document.getElementById('zoom').value=cellSize;
  document.getElementById('zoomVal').textContent=cellSize+'px/格';
  offsetX=mx-wBefore.x*cellSize;
  offsetY=my-wBefore.z*cellSize;
  render();
},{passive:false});

// sidebar toggle — rAF-resize during transition for smooth canvas
let sideRaf=0;
const sidebar=document.getElementById('sidebar');
const topBar=document.getElementById('topBar');
sidebar.addEventListener('transitionend',()=>{cancelAnimationFrame(sideRaf);resizeCanvas();render();});
function toggleSidebar(){
  cancelAnimationFrame(sideRaf);
  (function L(){resizeCanvas();render();sideRaf=requestAnimationFrame(L);})();
  sidebar.classList.toggle('collapsed');
  topBar.classList.toggle('collapsed');
}

// tab switch
function switchTab(idx){
  document.querySelectorAll('.tab-icon').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

// theme toggle
let isDark=true;
const moonSVG=`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
const sunSVG=`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('light',!isDark);
  document.getElementById('themeIcon').innerHTML=isDark?moonSVG:sunSVG;
  render();
}

// angle slider <-> number sync
function syncAngle(sliderId, numId){
  const s=document.getElementById(sliderId), n=document.getElementById(numId);
  s.addEventListener('input',()=>{n.value=s.value; render();});
  n.addEventListener('input',()=>{
    const v=Math.min(360,Math.max(0,+n.value||0));
    s.value=v; render();
  });
}
syncAngle('a0s','a0');
syncAngle('a1s','a1');

['x0','z0','x1','z1','h0','h1'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
});
document.getElementById('mode').addEventListener('change',()=>{if(lastBlocks.length)draw();});

window.addEventListener('resize',()=>{resizeCanvas();render();});
window.addEventListener('load',()=>{resizeCanvas();draw();});
resizeCanvas();
if(cv.width>0) draw();
</script>
